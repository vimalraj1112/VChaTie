<!DOCTYPE html>
<html>
<head><title>Inbox</title></head>
<body>
    <h2>Welcome, {{ request.user.username }}</h2>
    <a href="{% url 'logout' %}">Logout</a>
    <h3>Your Conversations</h3>
    <ul>
        {% for conv in conversations %}
            <li>
                {% if conv.is_group %}
                    {{ conv.group_name }}
                {% else %}
                    Chat #{{ conv.id }}
                {% endif %}
                — <a href="{% url 'room' conv.id %}">Open</a>
            </li>
        {% empty %}
            <li>No conversations yet.</li>
        {% endfor %}
    </ul>
</body>
</html>

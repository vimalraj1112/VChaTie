{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login - VChaTie</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'chatie/img/logo.svg' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'chatie/css/style.css' %}">
</head>
<body>
    <div class="auth-page-v2">
        <img src="{% static 'chatie/img/logo.svg' %}" alt="VChaTie" class="auth-logo">
        <div class="auth-brand-title">VChaTie</div>

        <div class="auth-card">
            <h2>Login</h2>
            {% if error %}<p class="auth-error-v2">{{ error }}</p>{% endif %}
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Username" required>
                <div class="password-wrapper">
                    <input type="password" name="password" id="password" placeholder="Password" required>
                    <span class="toggle-eye" onclick="togglePassword()">&#128065;</span>
                </div>
                <button type="submit">Login</button>
            </form>
            <p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
        </div>
    </div>

    <script>
    function togglePassword() {
        const input = document.getElementById('password');
        input.type = input.type === 'password' ? 'text' : 'password';
    }
    </script>
</body>
</html>
